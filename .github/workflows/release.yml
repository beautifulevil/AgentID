name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v prefix, for example 0.1.0"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Resolve version
        id: version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            version="$INPUT_VERSION"
          else
            version="${REF_NAME#v}"
          fi
          if [[ ! "$version" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $version" >&2
            exit 1
          fi
          printf 'value=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          version="${{ steps.version.outputs.value }}"
          target="${{ matrix.target }}"
          stem="agentid-${version}-${target}"
          mkdir -p "dist/${stem}"
          cp "target/${target}/release/agentid" "dist/${stem}/agentid"
          chmod +x "dist/${stem}/agentid"
          tar -czf "dist/${stem}.tar.gz" -C "dist/${stem}" agentid
          shasum -a 256 "dist/${stem}.tar.gz" > "dist/${stem}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: agentid-${{ matrix.target }}
          path: dist/*

  release:
    name: publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            version="$INPUT_VERSION"
            tag="v$INPUT_VERSION"
          else
            version="${REF_NAME#v}"
            tag="$REF_NAME"
          fi
          if [[ ! "$version" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z.-]+)?$ || "$tag" != "v$version" ]]; then
            echo "Invalid release version or tag: $tag" >&2
            exit 1
          fi
          printf 'value=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: agentid-*
          merge-multiple: true

      - name: Write checksums file
        run: cat dist/*.sha256 > dist/SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: agentid v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
